version: "3.9"

services:
  backend:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "4173:4173"
